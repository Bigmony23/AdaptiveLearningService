{% extends 'base.html' %}

{% block title %}404 - Страница не найдена{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="glass-effect p-5">
                <div style="font-size: 8rem; line-height: 1;">🔍</div>
                <h1 class="display-1 fw-bold mt-3" style="background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
                <h2 class="mb-3">Страница не найдена</h2>
                <p class="text-muted mb-4">Страница которую вы ищете не существует или была перемещена.</p>
                <div class="d-flex gap-3 justify-content-center flex-wrap">
                    <a href="{% url 'home' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-home me-2"></i>На главную
                    </a>
                    <a href="{% url 'courses' %}" class="btn btn-outline-light btn-lg">
                        <i class="fas fa-book-open me-2"></i>Курсы
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
