{% extends 'base.html' %}

{% block title %}500 - Ошибка сервера{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="glass-effect p-5">
                <div style="font-size: 8rem; line-height: 1;">⚙️</div>
                <h1 class="display-1 fw-bold mt-3" style="background: linear-gradient(135deg, #f093fb, #f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">500</h1>
                <h2 class="mb-3">Ошибка сервера</h2>
                <p class="text-muted mb-4">Что-то пошло не так на нашей стороне. Мы уже работаем над исправлением.</p>
                <a href="{% url 'home' %}" class="btn btn-primary btn-lg">
                    <i class="fas fa-home me-2"></i>На главную
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
