{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

<div class="glass-effect p-4">

<h2 class="text-white mb-4">
    <i class="fas fa-layer-group me-2"></i>
    Модули
</h2>

<table class="table admin-table">

    <thead>
        <tr>
            <th>Название</th>
            <th>Курс</th>
            <th>Порядок</th>
            <th>Часы</th>
        </tr>
    </thead>

    <tbody>

    {% for module in modules %}
        <tr>
            <td>{{ module.title }}</td>
            <td>{{ module.course_id.title }}</td>
            <td>{{ module.order_index }}</td>
            <td>{{ module.estimated_hours }}</td>
        </tr>
    {% endfor %}

    </tbody>

</table>

</div>

</div>
{% endblock %}
